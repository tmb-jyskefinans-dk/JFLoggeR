<div class="min-h-screen bg-gradient-to-b from-white to-slate-50 dark:from-slate-900 dark:to-slate-950 text-slate-800 dark:text-slate-100 selection:bg-indigo-200 dark:selection:bg-indigo-500/40 transition-colors duration-300">
  <header class="sticky top-0 z-20 border-b border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-slate-900/70 backdrop-blur shadow-sm">
    <window-controls />
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
  <h1 class="text-lg md:text-xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">JF LoggR</h1>
    <nav class="flex gap-2 text-xs md:text-sm font-medium">
  <a routerLink="/today" title="Gå til I dag (Alt+T)" class="inline-flex items-center px-3 h-8 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition">I dag</a>
  <a [routerLink]="['/summary', today()]" title="Opsummering for i dag (Alt+S)" class="inline-flex items-center px-3 h-8 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition">Opsummering</a>
  <a routerLink="/settings" title="Åbn indstillinger (Alt+I)" class="inline-flex items-center px-3 h-8 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition">Indstillinger</a>
      </nav>
      <div class="ml-auto flex items-center gap-3">
        @if(pendingCount() > 0) {
          <button type="button" (click)="openDialog()"
            class="inline-flex items-center rounded-full border border-indigo-600 px-3 py-1 text-xs font-medium bg-indigo-600 text-white shadow-sm hover:bg-indigo-500 active:bg-indigo-700 transition"
            title="Åbn log dialog for ventende intervaller" aria-label="Åbn log dialog for ventende intervaller">
            {{pendingCount()}} ventende
          </button>
        }
  <div class="relative flex" (keydown.escape)="closeMenu()" data-menu-root>
          <button (click)="openDialog()"
            class="inline-flex items-center justify-center rounded-l-md text-sm font-semibold px-4 h-9 gap-2 bg-indigo-600 text-white shadow hover:bg-indigo-500 active:bg-indigo-700 disabled:opacity-40 transition"
            aria-label="Log ventende intervaller nu">
            Log nu
          </button>
          <button (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-haspopup="menu"
            class="inline-flex items-center justify-center rounded-r-md text-sm font-semibold px-2 h-9 bg-indigo-600 text-white shadow hover:bg-indigo-500 active:bg-indigo-700 disabled:opacity-40 transition border-l border-indigo-500/40"
            aria-label="Flere log muligheder (Log nu Alt+L, Manuel registrering Alt+M)">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4" aria-hidden="true"><path d="M6 8l4 4 4-4"/></svg>
          </button>
          @if(menuOpen()) {
            <div class="absolute top-full right-0 mt-1 w-48 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-lg z-10" role="menu" aria-label="Log muligheder">
              <button type="button" role="menuitem" (click)="openDialog(); closeMenu()"
                class="w-full text-left px-3 py-2 text-sm hover:bg-indigo-50 dark:hover:bg-slate-700 transition">
                Log nu
              </button>
              <button type="button" role="menuitem" (click)="openManualWithDate()"
                class="w-full text-left px-3 py-2 text-sm hover:bg-indigo-50 dark:hover:bg-slate-700 transition">
                Manuel registrering (Alt+M)
              </button>
            </div>
          }
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <router-outlet />
  </main>

  @if(snackbar.message()) {
    <div class="fixed bottom-4 right-4 z-50 select-none">
      <div class="rounded-md bg-slate-900/90 dark:bg-slate-900 text-white px-4 py-2 text-xs shadow-lg flex items-center gap-2 animate-fade-in" role="status" aria-live="polite">
        <svg class="w-3.5 h-3.5 opacity-70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 16h-1v-4h-1"/><path d="M12 8h.01"/><circle cx="12" cy="12" r="10"/></svg>
        <span>{{snackbar.message()}}</span>
      </div>
    </div>
  }

  @if(dialogOpen()) {
    <log-dialog [openedFromNotification]="dialogOpenedFromNotification()" (closed)="closeDialog()" />
  }
  @if(manualDialogOpen()) {
    <log-dialog [manualMode]="true" [manualInitialDate]="manualDialogDate()" (closed)="closeManualDialog()" />
  }
</div>
